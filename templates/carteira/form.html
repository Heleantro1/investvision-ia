<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }} - InvestVision IA</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 40px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        h1 {
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        select,
        input {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f8fafc;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            margin-top: 24px;
            background: #22c55e;
            color: #052e16;
            padding: 12px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn-secundario {
            background: #334155;
            color: #f8fafc;
            margin-left: 10px;
        }

        .erro {
            color: #f87171;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>{{ titulo }}</h1>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <label>{{ field.label }}</label>
                {{ field }}

                {% for error in field.errors %}
                    <div class="erro">{{ error }}</div>
                {% endfor %}
            {% endfor %}

            {% for error in form.non_field_errors %}
                <div class="erro">{{ error }}</div>
            {% endfor %}

            <button type="submit" class="btn">Salvar</button>
            <a href="{% url 'listar_carteira' %}" class="btn btn-secundario">Cancelar</a>
        </form>
    </div>
</div>

</body>
</html>
