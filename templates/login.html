<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - InvestVision IA</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 20% 30%, rgba(56,189,248,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(99,102,241,0.18), transparent 40%),
                linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.95)),
                url("/static/img/fundo-fintech.png");
            background-size: cover;
            background-position: center;
        }

        .login-box {
            width: 390px;
            padding: 40px;
            background: rgba(30,41,59,0.65);
            backdrop-filter: blur(18px);
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo {
            color: #94a3b8;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 30px;
            margin: 0 0 25px;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56,189,248,0.5);
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(56,189,248,0.5);
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(56,189,248,0.9);
        }

        .erro {
            color: #f87171;
            margin-bottom: 15px;
        }

        .link {
            margin-top: 18px;
            color: #cbd5e1;
        }

        .link a {
            color: #38bdf8;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">InvestVision IA</div>
    <h2>Entrar</h2>

    {% if form.errors %}
        <div class="erro">Usuário ou senha inválidos</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Usuário" required>
        <input type="password" name="password" placeholder="Senha" required>

        <button type="submit">Entrar</button>
    </form>

    <div class="link">
        Ainda não tem conta?
        <a href="{% url 'register' %}">Criar conta</a>
    </div>
</div>

</body>
</html>
