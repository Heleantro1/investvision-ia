{% extends "admin/base_site.html" %}

{% block extrahead %}

<style>

        right: 24px;
        bottom: 24px;
        z-index: 9999;

        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: white !important;

        padding: 14px 20px;
